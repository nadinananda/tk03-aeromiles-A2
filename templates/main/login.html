{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <i class="bi bi-airplane-fill text-primary" style="font-size: 3rem;"></i>
            <h2 class="mt-2">Selamat Datang</h2>
            <p class="text-muted">Masuk ke akun AeroMiles Anda</p>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body p-4">
                {% if error %}
                    <div class="alert alert-danger" role="alert">{{ error }}</div>
                {% endif %}

                <form method="POST" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="email@example.com" value="{{ email_value }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Log In
                    </button>
                </form>

                <hr>
                <p class="text-center small text-muted mb-0">Belum punya akun? <a href="{% url 'main:register' %}">Daftar di sini</a></p>
            </div>
        </div>

        <div class="alert alert-info mt-4 small">
            <strong>Demo Akun:</strong><br>
            Member: {{ demo_member }}<br>
            Staf: {{ demo_staf }}
        </div>
    </div>
</div>
{% endblock content %}
