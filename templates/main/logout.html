{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body text-center p-5">
                <div class="mb-4">
                    <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                </div>
                
                <h2 class="card-title mb-3">Anda Telah Logout</h2>
                
                <p class="text-muted mb-4">
                    Terima kasih telah menggunakan AeroMiles.<br>
                    <small>{{ email }}</small>
                </p>
                
                <div class="alert alert-info small mb-4">
                    <i class="bi bi-info-circle me-2"></i>
                    Logout dilakukan pada: <strong>{{ logout_time }}</strong>
                </div>
                
                <div class="d-grid gap-2">
                    <a href="{% url 'main:login' %}" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Masuk Kembali
                    </a>
                    <a href="{% url 'main:register' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-person-plus me-2"></i>Buat Akun Baru
                    </a>
                </div>
                
                <hr class="my-4">
                
                <p class="text-muted small mb-0">
                    <i class="bi bi-shield-lock me-1"></i>
                    Sesi Anda telah ditutup dengan aman.
                </p>
            </div>
        </div>
        
        <div class="text-center mt-3">
            <small class="text-muted">
                &copy; 2026 AeroMiles. All rights reserved.
            </small>
        </div>
    </div>
</div>
{% endblock content %}
